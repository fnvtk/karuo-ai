# www.lytiao.com 可多服务器部署
# 用法：docker compose up -d
# 访问：http://主机IP:8080 或配置 Nginx 反向代理
version: "3.8"
services:
  lytiao-web:
    build: .
    container_name: lytiao-www
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html:ro
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai

