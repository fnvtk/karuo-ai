# 微信管理配置文件模板
# 复制此文件到 ~/.config/wechat_manager/config.yaml 并修改

# ============================================
# 基础配置
# ============================================

# 微信数据路径（auto = 自动检测）
wechat_data_path: auto

# 输出目录
output_dir: ~/Documents/微信管理

# 数据库密钥（从解密工具获取，如 chatlog）
# 格式：64位十六进制字符串
db_key: ""

# ============================================
# RFM 配置
# ============================================
rfm:
  # R值分段（天数）
  recency_days:
    - 7      # 5分：7天内
    - 30     # 4分：30天内
    - 90     # 3分：90天内
    - 180    # 2分：180天内
    - 365    # 1分：365天内

  # F值分段（消息数）
  frequency_count:
    - 50     # 5分：50条以上
    - 20     # 4分：20条以上
    - 10     # 3分：10条以上
    - 5      # 2分：5条以上
    - 1      # 1分：1条以上

  # 价值权重
  value_weight:
    recency: 0.3
    frequency: 0.4
    monetary: 0.3

  # 关键词配置
  keywords:
    high_value:     # +3分
      - 合作
      - 投资
      - 采购
      - 签约
      - 付款
      - 项目
      - 需求
      - 预算
      - 订单

    medium_value:   # +2分
      - 咨询
      - 了解
      - 推荐
      - 介绍
      - 报价
      - 方案
      - 沟通
      - 交流

    low_value:      # +1分
      - 谢谢
      - 感谢
      - 帮忙
      - 请教
      - 学习

    negative:       # -1分
      - 广告
      - 推销
      - 砍价
      - 免费

# ============================================
# 导出配置
# ============================================
export:
  # 默认导出格式
  default_format: json  # json / csv / html

  # 是否包含媒体文件
  include_media: false

  # 时间范围（null = 全部）
  start_date: null
  end_date: null

  # 指定导出的群
  include_groups: []
    # - "创业者交流群"
    # - "私域运营群"

  # 指定导出的联系人
  include_contacts: []
    # - "夏茜"
    # - "李冰"

# ============================================
# 自动化配置
# ============================================
automation:
  # 每日摘要
  daily_summary:
    enabled: true
    time: "07:00"

  # RFM 更新
  rfm_update:
    enabled: true
    time: "23:00"

  # 朋友圈同步
  moments_sync:
    enabled: false
    time: "12:00"

  # 自动点赞
  auto_like:
    enabled: false
    targets: []
    max_per_day: 50
    interval_seconds: [60, 180]  # 随机间隔

  # 自动评论
  auto_comment:
    enabled: false
    templates:
      - "👍"
      - "学习了"
      - "太棒了！"
      - "感谢分享"
    targets: []

# ============================================
# 提醒配置
# ============================================
alerts:
  # 关键词提醒
  keywords:
    - 付款
    - 签约
    - 紧急
    - "@我"

  # VIP联系人提醒
  vip_contacts:
    # - "夏茜"
    # - "李冰"

  # 提醒方式
  notify:
    system: true      # 系统通知
    sound: true       # 声音提醒
    email: false      # 邮件提醒

# ============================================
# AI 配置
# ============================================
ai:
  # 使用的 AI 服务
  provider: gemini  # openai / gemini / local

  # API 密钥
  api_key: ""

  # 模型选择
  model: gemini-pro

  # 功能开关
  features:
    daily_summary: true    # AI 生成每日摘要
    chat_insights: true    # AI 聊天洞察
    reply_suggest: false   # AI 回复建议

# ============================================
# 安全配置
# ============================================
security:
  # 操作前自动备份
  backup_before_change: true

  # 每日自动操作上限
  max_auto_actions: 100

  # 试运行模式（不实际执行）
  dry_run: true

  # 敏感词过滤（导出时隐藏）
  sensitive_words: []

# ============================================
# 调试配置
# ============================================
debug:
  enabled: false
  log_level: INFO  # DEBUG / INFO / WARNING / ERROR
  log_file: ~/Documents/微信管理/logs/wechat_manager.log
