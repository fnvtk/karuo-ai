# ====================================
# 账户配置模板
# 
# 使用方法:
# 1. 复制本文件为 account.yaml
# 2. 填写你的账户信息
# 3. 勿将 account.yaml 提交到Git
# ====================================

# 券商账户
broker:
  # 券商类型
  # - xcsc: 湘财证券（同花顺客户端）
  # - ths: 同花顺通用客户端
  # - qmt: MiniQMT量化接口
  # - yinhe: 银河证券
  # - huatai: 华泰证券
  type: "xcsc"
  
  # 资金账号
  account: ""
  
  # 交易密码
  password: ""
  
  # 客户端路径（Windows）
  # client_path: "C:\\同花顺\\xiadan.exe"
  
  # 远程服务（Mac用户）
  # remote_url: "http://windows-server:5000"

# 交易参数
trading:
  # 交易模式: paper(模拟), live(实盘)
  mode: "paper"
  
  # 最大持仓数量
  max_positions: 5
  
  # 单股仓位比例
  position_pct: 0.2
  
  # 每日交易金额
  daily_amount: 50000
  
  # 保留现金比例
  cash_reserve: 0.1

# 数据源API（可选）
api:
  # 聚宽
  joinquant:
    account: ""
    password: ""
  
  # 同花顺数据API
  ths:
    token: ""
  
  # Tushare
  tushare:
    token: ""
