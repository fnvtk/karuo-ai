# ====================================
# 量化交易系统配置文件 - 卡若账户
# 
# ⚠️ 注意: 此文件包含敏感信息，请勿提交到Git
# ====================================

# 券商账户配置 (湘财证券)
broker:
  type: "xcsc"
  account: "600201668"
  password: "6389003"
  # 客户端路径 (Mac用户需要使用远程Windows或虚拟机)
  # client_path: "C:\\同花顺\\xiadan.exe"
  # remote_url: "http://windows-server:5000"

# 交易参数
trading:
  mode: "paper"           # paper=模拟, live=实盘
  max_positions: 5
  position_pct: 0.2
  stop_loss: -0.05
  take_profit: 0.08
  daily_amount: 50000
  cash_reserve: 0.1

# 策略配置
strategies:
  enabled:
    - "holiday"
    - "7k_line"
    - "expert"
  
  holiday:
    buy_before_days: 2
    sell_after_days: 7
    stop_loss: -0.03
    target_profit: 0.08
    top_sectors: 5
    top_stocks_per_sector: 3
  
  7k_line:
    hold_days: 7
    stop_loss: -0.05
    target_profit: 0.05
    min_rise_days: 3
    min_rise_rate: 0.05
    max_capital: 10
    min_volume_ratio: 1.5
  
  expert:
    top_n: 10
    min_score: 0.75
    stop_loss: -0.05
    delay_threshold: 1.0

# 数据源配置
data:
  godeye_api: "http://localhost:8000"
  
  xueqiu:
    enabled: true
    crawl_interval: 60
    hot_posts_count: 50
  
  quotes:
    provider: "sina"

# 数据库配置 (上帝之眼)
database:
  mongodb:
    uri: "mongodb://localhost:27017"
    database: "godeye"
  
  redis:
    host: "localhost"
    port: 6379
    password: ""

# 日志配置
logging:
  level: "INFO"
  file: "logs/trading.log"
  max_size: "10MB"
  backup_count: 5

# 通知配置
notification:
  wechat_webhook: ""
  dingtalk_webhook: ""
  events:
    - "trade_executed"
    - "stop_loss_triggered"
    - "daily_summary"
