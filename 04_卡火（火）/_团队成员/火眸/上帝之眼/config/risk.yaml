# ====================================
# 风控配置
# ====================================

# 止损规则
stop_loss:
  # 单股止损
  single_stock: -0.05
  
  # 单日止损（整体）
  daily_loss: -0.05
  
  # 最大回撤
  max_drawdown: -0.15
  
  # 触发后动作
  actions:
    single_stock: "immediate_sell"    # 立即卖出
    daily_loss: "pause_1_day"         # 暂停1天
    max_drawdown: "manual_review"     # 人工介入

# 仓位控制
position:
  # 最大持仓数量
  max_positions: 5
  
  # 单股最大仓位
  single_stock_max: 0.25
  
  # 同板块最大仓位
  sector_max: 0.40
  
  # 保留现金比例
  cash_reserve: 0.10

# 交易频率控制
frequency:
  # 每日最大交易次数
  daily_trades_max: 5
  
  # 每分钟最大交易次数
  minute_trades_max: 3
  
  # 同一股票买入间隔（秒）
  same_stock_interval: 3600
  
  # 连续亏损后暂停
  consecutive_loss_pause: 3

# 时间控制
timing:
  # 禁止交易时段
  no_trade_before: "09:30"
  no_trade_after: "14:45"
  no_trade_lunch_start: "11:30"
  no_trade_lunch_end: "13:00"
  
  # 周末/节假日自动停止
  skip_weekends: true
  skip_holidays: true

# 异常监控
monitor:
  # 网络检测间隔（秒）
  network_check_interval: 30
  
  # 断网超时（秒）
  network_timeout: 60
  
  # 订单超时（秒）
  order_timeout: 30
  
  # 最大重试次数
  max_retries: 3

# 告警配置
alert:
  # 触发告警的事件
  events:
    - stop_loss_triggered
    - daily_loss_triggered
    - max_drawdown_triggered
    - network_error
    - order_failed
  
  # 通知方式
  channels:
    # 企业微信
    wechat_webhook: ""
    
    # 钉钉
    dingtalk_webhook: ""
    
    # 邮件
    email: ""
