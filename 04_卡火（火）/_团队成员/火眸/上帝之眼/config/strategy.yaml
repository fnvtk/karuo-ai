# ====================================
# 策略配置（卡若原创版）
# ====================================

# 启用的策略
enabled:
  - holiday_factor    # 节假日因子策略（核心）
  - strong_pick       # 强中强策略
  - expert_track      # 模拟股策略
  - sector_rotate     # 板块分析策略

# ====================================
# 节假日因子策略（卡若原创五步选股法）
# ====================================
holiday_factor:
  # 历史统计年数
  history_years: 5
  
  # 第一步：选出出现次数最多的N个板块
  top_sectors: 2
  
  # 第二步：每板块选N只个股
  stocks_per_sector: 3
  
  # 第五步：买入前N名
  buy_count: 3
  
  # 买入时机：节前N天
  buy_before_days: 2
  
  # 卖出时机：节后第N根K线
  sell_after_klines: 7
  
  # 止损
  stop_loss: -0.03
  
  # 排除条件
  exclude:
    limit_up: true      # 排除涨停
    limit_down: true    # 排除跌停
    st: false           # 不排除ST
  
  # 评分规则（卡若均线理论）
  karuo_ma_scoring:
    # 牛市排列（天堂>邪恶>地狱）
    bull_alignment: 40
    # 上涨趋势（天堂>邪恶）
    uptrend: 30
    # 金叉（天堂上穿邪恶）
    golden_cross: 20
    # 价格在天堂线上方
    above_heaven: 10
    # 历史出现次数评分（每次10分，最高50分）
    appear_times_weight: 10
    appear_times_max: 50

# ====================================
# 强中强策略（7根K线）
# ====================================
strong_pick:
  # 持有天数
  hold_days: 7
  
  # 止损
  stop_loss: -0.05
  
  # 目标收益
  target_profit: 0.05
  
  # 买入数量
  buy_count: 3
  
  # 注意：此策略也使用卡若均线评分
  use_karuo_ma: true

# ====================================
# 模拟股策略（高手跟踪）
# ====================================
expert_track:
  # 数据源平台
  platforms:
    - xueqiu         # 雪球组合
    - ths            # 同花顺模拟盘
    - joinquant      # 聚宽策略
  
  # 跟踪前N名高手
  top_n: 10
  
  # 高手筛选标准
  min_score: 0.75
  min_return: 0.30
  min_win_rate: 0.55
  max_drawdown: 0.20
  
  # 跟单止损
  stop_loss: -0.05

# ====================================
# 板块分析策略
# ====================================
sector_rotate:
  # 关注板块数量
  top_sectors: 5
  
  # 数据源
  data_sources:
    - eastmoney
    - akshare

# ====================================
# 卡若均线系统说明
# ====================================
# 天堂线 = (MA5 + MA10 + MA20) / 3 的5日均值（白线）
# 邪恶线 = MA60的5日均值（绿线）
# 地狱线 = (MA120 + MA240) / 2 的5日均值（红线）
#
# 买入信号：
# - 牛市排列：天堂 > 邪恶 > 地狱
# - 金叉：天堂线上穿邪恶线
# - 价格在天堂线上方
#
# 卖出信号：
# - 死叉：天堂线下穿邪恶线
# - 价格跌破邪恶线
